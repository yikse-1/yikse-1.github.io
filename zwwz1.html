<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="3">
    <link rel="icon" type="image/png" href="img/dog.png">
    <title>巡场西施</title>
    <style>
        h1 { text-align: center; color: #E63946; }
        hr { border-color: #EDA0A1; }
        p { 
            text-align: center; 
            font-size: 20px; 
            color: #CD5C5C;
            line-height: 2;
        }
        
        img {
            display: block; /* 让图片单独占一行，方便居中 */
            margin: 20px auto; /* 上下留20px间距，左右自动居中 */
            width: 300px; /* 照片宽度，可改（比如250px/400px） */
            height: auto; /* 高度自动，保证照片不变形 */
            border-radius: 8px; /* 可选：给照片加圆角，更美观 */
        }
    </style>
</head>
<body>
    <h1>欢迎来到张汶的世界</h1>
    <hr>
    <p>张汶的右眼</p>
   
    <img src="img/zw1.jpg" alt="张汶的右眼">
    <p>张汶的双眼</p>
   
    <img src="img/zw2.jpg" alt="张汶的双眼">
	<p>张汶的侧脸</p>
   
    <img src="img/zw3.jpg" alt="张汶的侧脸">
</body>
</html>
